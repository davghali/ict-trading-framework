# ============================================================
# PROP FIRMS — RÈGLES HARD-CODÉES (COMPLIANCE NON-NÉGOCIABLE)
# Le Risk Engine applique ces règles comme contraintes absolues.
# Toute violation = blocage trade + kill switch.
# ============================================================

ftmo:
  name: "FTMO"
  variants:
    classic_challenge:
      initial_balance: 100000           # USD, exemple 100K
      max_daily_loss_pct: 5.0           # % du balance initial (NON equity)
      max_overall_loss_pct: 10.0        # % du balance initial
      profit_target_pct: 10.0
      min_trading_days: 0               # supprimé en 2023
      max_days: null                    # illimité depuis 2024
      weekend_holding: false            # INTERDIT en Classic
      news_trading: true                # autorisé
      leverage:
        forex: 100
        indices: 20
        metals: 30
        crypto: 2
      reset_daily_loss_at: "00:00 CE(S)T"  # reset minuit Prague

    verification:
      initial_balance: 100000
      max_daily_loss_pct: 5.0
      max_overall_loss_pct: 10.0
      profit_target_pct: 5.0
      weekend_holding: false

    funded:
      initial_balance: 100000
      max_daily_loss_pct: 5.0
      max_overall_loss_pct: 10.0
      profit_target_pct: 0.0            # pas de target, profit split
      profit_split: 0.80                # 80% trader
      weekend_holding: false

the_5ers:
  name: "The 5ers"
  variants:
    bootcamp:
      initial_balance: 100000
      max_daily_loss_pct: 5.0
      max_overall_loss_pct: 6.0         # conservateur
      profit_target_pct: 6.0            # par palier
      min_trading_days: 10
      weekend_holding: true             # autorisé (contrairement FTMO)
      news_trading: true
      scaling_plan: true
      levels: 6                         # 6 niveaux de scaling

    hpt:                                # High Stakes / High Performance Trader
      initial_balance: 100000
      max_daily_loss_pct: 4.0           # plus strict
      max_overall_loss_pct: 8.0
      profit_target_pct: 8.0
      min_trading_days: 5
      weekend_holding: true
      profit_split: 0.75                # 75% trader au début, jusqu'à 100%

# ============================================================
# RISK ENGINE INTERNAL LIMITS (plus stricts que prop firm)
# But : trader BIEN EN DESSOUS des limites pour zéro blow-up
# ============================================================
internal_safety:
  # Buffer de sécurité — on s'arrête AVANT les limites prop firm
  daily_loss_soft_cap_pct: 2.5          # stop trading si -2.5% (50% de la limite)
  daily_loss_hard_cap_pct: 3.5          # kill switch à -3.5% (70% de la limite)
  overall_loss_soft_cap_pct: 6.0        # reduce size si -6%
  overall_loss_hard_cap_pct: 7.0        # kill switch à -7%

  # Risque par trade
  risk_per_trade_base_pct: 0.5          # 0.5% base — très conservateur
  risk_per_trade_max_pct: 1.0           # plafond absolu

  # Consecutive losses = réduction automatique
  max_consecutive_losses: 3             # après 3 pertes → pause 24h
  drawdown_scale_down:                  # réduction de taille en DD
    - threshold_pct: -2.0
      size_multiplier: 0.75
    - threshold_pct: -3.5
      size_multiplier: 0.50
    - threshold_pct: -5.0
      size_multiplier: 0.25

  # Trades par jour
  max_trades_per_day: 3                 # qualité > quantité
  max_trades_per_week: 10
